<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - STEM & Coding Summer Camp Portal</title>
    <!-- Inline SVG Favicon representing branding cubes -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cpath d='M50 15 L85 32 L50 50 L15 32 Z' fill='%23a855f7'/%3E%3Cpath d='M15 32 L50 50 L50 85 L15 67 Z' fill='%237c3aed'/%3E%3Cpath d='M50 50 L85 32 L85 67 L50 85 Z' fill='%236d28d9'/%3E%3Cpath d='M50 35 L68 44 L50 53 L32 44 Z' fill='%23ec4899'/%3E%3Cpath d='M32 44 L50 53 L50 71 L32 62 Z' fill='%23db2777'/%3E%3Cpath d='M50 53 L68 44 L68 62 L50 71 Z' fill='%23be185d'/%3E%3C/svg%3E">
    <!-- Google Fonts for Modern Playful and Professional Look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300..900&family=Quicksand:wght@300..700&family=Inter:wght@300..900&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-theme ltr auth-body">

    <!-- Top Right Toggles -->
    <div class="auth-header-toggles">
        <!-- Theme Toggle -->
        <button class="theme-toggle" aria-label="Toggle Dark/Light Mode">
            <i class="fa-solid fa-moon"></i>
        </button>
        <!-- LTR/RTL Text Direction Toggle -->
        <button class="dir-toggle" aria-label="Toggle LTR/RTL Text Direction">
            <span>RTL</span>
        </button>
    </div>

    <!-- Register Container -->
    <div class="auth-card">
        <!-- Logo -->
        <a href="index.html" class="logo">
            <div class="logo-icon">
                <i class="fa-solid fa-cubes-stacked"></i>
            </div>
            <div class="logo-text">
                <span class="logo-highlight">STEM</span>Camp
            </div>
        </a>

        <!-- Form -->
        <form class="auth-form" id="register-form">
            <div class="form-group">
                <label class="form-label" for="register-name">Parent Name</label>
                <input type="text" id="register-name" class="form-input" placeholder="Amanda Jenkins" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="register-email">Email Address</label>
                <input type="email" id="register-email" class="form-input" placeholder="parent@mail.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="register-password">Password</label>
                <input type="password" id="register-password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="register-confirm">Confirm Password</label>
                <input type="password" id="register-confirm" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign Up</button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">or continue with</div>

        <!-- OAuth Buttons -->
        <div class="oauth-buttons">
            <button type="button" class="btn-oauth" id="oauth-google">
                <i class="fa-brands fa-google text-pink"></i> Google
            </button>
            <button type="button" class="btn-oauth" id="oauth-facebook">
                <i class="fa-brands fa-facebook-f text-blue"></i> Facebook
            </button>
        </div>

        <!-- Footer link -->
        <div class="auth-footer-text">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const themeToggles = document.querySelectorAll('.theme-toggle');
            const dirToggles = document.querySelectorAll('.dir-toggle');
            const registerForm = document.getElementById('register-form');

            // --- Theme & Direction Sync on Load ---
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                body.classList.add('dark-theme');
                themeToggles.forEach(t => {
                    const icon = t.querySelector('i');
                    if (icon) icon.className = 'fa-solid fa-sun';
                });
            }

            const savedDir = localStorage.getItem('dir');
            if (savedDir === 'rtl') {
                body.classList.add('rtl');
                document.documentElement.dir = 'rtl';
                dirToggles.forEach(t => {
                    const span = t.querySelector('span');
                    if (span) span.textContent = 'LTR';
                });
            }

            // --- Toggles Functionality ---
            themeToggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    body.classList.toggle('dark-theme');
                    const isDark = body.classList.contains('dark-theme');
                    themeToggles.forEach(t => {
                        const icon = t.querySelector('i');
                        if (icon) {
                            icon.className = isDark ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
                        }
                    });
                    localStorage.setItem('theme', isDark ? 'dark' : 'light');
                });
            });

            dirToggles.forEach(toggle => {
                toggle.addEventListener('click', () => {
                    body.classList.toggle('rtl');
                    const isRtl = body.classList.contains('rtl');
                    document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
                    dirToggles.forEach(t => {
                        const span = t.querySelector('span');
                        if (span) {
                            span.textContent = isRtl ? 'LTR' : 'RTL';
                        }
                    });
                    localStorage.setItem('dir', isRtl ? 'rtl' : 'ltr');
                });
            });

            // --- Form Redirection ---
            if (registerForm) {
                registerForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    window.location.href = 'index.html?view=user-dashboard';
                });
            }

            // Simulating OAuth clicks
            const socialButtons = document.querySelectorAll('.btn-oauth');
            socialButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    window.location.href = 'index.html?view=user-dashboard';
                });
            });
        });
    </script>
</body>
</html>
